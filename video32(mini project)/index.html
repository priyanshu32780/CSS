<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Card Desing</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body {
            background-color: rgb(57, 51, 51);
            padding: 45px;
        }

        .card {
            background-color: white;
            width: 198px;
            border-radius: 7px;
            padding: 0 0 34px 0;
        }

        .image {
            padding: 5px;
        }

        .image image {
            border-radius: 7px;
        }
        .content p{
            font-size:13px ;
            padding: 5px 13px;
            color: brown;
            font-style: oblique;
        }
        .capsule{
            padding: o 34px;
        }
.capsule span{
    border: 1px solid rgb(93, 148, 150);
    padding: 1px 4px;
    border-radius: 7px;
    font-size: 12px;
}
.content h2{
    font-style:normal;
}
.button{
    text-align: center;
}
.button button{
    padding: 4px 7px;
    border-radius: 15px;
    background-color: rgb(177, 208, 216);
    color: blue;
    font-size: 10px;
    border: none;
    margin-top: 7px;
    cursor: pointer;
    
}
.button button:hover{
    background-color:  rgb(111, 129, 134) ;
    color: rgb(6, 6, 152);
}
    </style>
</head>

<body>
    <div class="card">
        <div class="image">
            <img width="188" src="image.png" alt="Nature">
            <div class="capsule">
                <span>Nature</span>
                <span>Lake</span>
            </div>
            <div class="content">
            <h3>Priyanshu</h3>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Autem quod voluptatibus laborum, similique
                numquam accusamus aliquam delectus quaerat. Unde iste quod rem labore.</p>
                </div>
                <div class="button">
                    <button>Read More</button>
                </div>
        </div>

    </div>
</body>

</html>
