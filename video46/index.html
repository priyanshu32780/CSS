<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations property</title>
    <style>
        .container{
            background-color: rgb(159, 225, 225);
            height: 80vh;
            width: 30vw;
        }
        .box{
            width: 34px;
            height: 45px;
            background-color:aqua;
           /* animation-name: priyanshuAnimation;
           animation-duration: 1s;
           animation-iteration-count: infinite;
           animation-timing-function: cubic-bezier(0, 0, 0, 1.21);
           animation-delay: 1s;
           /* animation-direction: alternate-reverse; */
           /* animation-play-state: paused; */ 
     /* animation: name duration timing-function delay iteration-count direction fill-mode; */
           animation: priyanshuAnimation 3s ease-in-out 3s 1;
         
        }

        @keyframes priyanshuAnimation {
            from{
background-color: red;
            }
            to{
                transform: translatex(1000px);
                background-color: yellow;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            BOX
        </div>
    </div>
</body>
</html>
