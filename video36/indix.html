<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Multicolor Website</title>
    <style>
        /* :root{
            --primary-color:#0aecec;
            --text-color:white;
            --secondary-color:#066262;
        } */
         :root{
            --primary-color:#a4ec0a;
            --text-color:rgb(165, 15, 15);
            --secondary-color:#06621d;
        body{
            background-color:var(--secondary-color);
        }
        *{
            margin: 0;
            padding: 0;
        }
        nav{
            background-color:var(--primary-color);
            padding: 12px 0;
        }
ul li{
    list-style: none;
    display: inline;
    padding: 23px;
    font-weight: bold;
    color: var(--text-color);
}
ul li a{
    color: var(--text-color);
    text-decoration: none;
}
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">Contact</a></li>
                <li><a href="/">Location</a></li>
                <li><a href="/">Landmark</a></li>
            </ul>
        </nav>
    </header>
</body>
</html>
