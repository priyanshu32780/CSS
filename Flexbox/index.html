<!DOCTYPE html>
<html>
<head>
  <style>
    .container {
      display: flex;
      justify-content: center;   /* horizontal alignment */
      align-items: center;       /* vertical alignment */
      height: 100vh;
      background-color: #f2f2f2;
    }

    .box {
      width: 100px;
      height: 100px;
      background-color: teal;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>

</body>
</html>
